<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mage Titan: Evolution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="spawnParticle(event)">
    <div id="game-app">
        <div id="flash-overlay"></div>

        <header class="game-header">
            <div class="header-left">
                <span class="stage-tag">ETAPA <span id="stage-num">1</span></span>
            </div>
            <div class="gold-container">
                <img src="https://cdn-icons-png.flaticon.com/512/272/272525.png" width="25">
                <span id="gold-count">0</span>
            </div>
        </header>

        <section id="world">
            <div id="enemy-ui">
                <div class="hp-wrapper">
                    <div id="hp-progress"></div>
                    <span id="hp-text">100 / 100</span>
                </div>
                <h2 id="enemy-name">GUARDIÁN DE PIEDRA</h2>
            </div>

            <div id="battle-area">
                <div id="pet-area">
                    <div class="pet-entity" id="main-pet">🐉</div>
                </div>
                <div id="boss-sprite" onclick="handleTap(event)">👿</div>
                <div id="effects-layer"></div>
            </div>

            <div id="skills-bar">
                <div class="skill-slot" onclick="activateSkill('frenzy')">🔥<div class="cooldown" id="cd-1"></div></div>
                <div class="skill-slot" onclick="activateSkill('storm')">⚡<div class="cooldown" id="cd-2"></div></div>
            </div>
        </section>

        <nav id="bottom-menu">
            <div class="menu-tabs">
                <button class="tab-btn active" onclick="switchTab('heroes')">HÉROE</button>
                <button class="tab-btn" onclick="switchTab('pets')">MASCOTAS</button>
                <button class="tab-btn" onclick="switchTab('stats')">STATS</button>
            </div>
            <div class="scroll-content" id="upgrade-list">
                </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
