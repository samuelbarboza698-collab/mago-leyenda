<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mage Legend: Evolution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="parallax-bg layer-1"></div>
        <div class="parallax-bg layer-2"></div>
        
        <div id="flash-overlay"></div>

        <header>
            <div class="header-info">
                <div class="stage-badge">STAGE <span id="stage-num">1</span></div>
                <div id="boss-timer" style="display:none">⏱️ <span id="time-left">30</span>s</div>
            </div>
            <div class="currency-group">
                <div class="res gold">🪙 <span id="gold">0</span></div>
                <div class="res gems">💎 <span id="gems">0</span></div>
            </div>
        </header>

        <main id="battle-area">
            <div class="enemy-header">
                <div class="hp-bar-container">
                    <div id="hp-fill"></div>
                    <span id="hp-text">100 / 100</span>
                </div>
                <h2 id="enemy-name">GUARDIÁN FORESTAL</h2>
            </div>

            <div id="target-zone" onclick="handleTap(event)">
                <img id="enemy-img" src="https://i.ibb.co/vzXq2C9/monster-placeholder.png">
                <div id="damage-popups"></div>
            </div>

            <div id="player-squad">
                <div class="pet-container">
                    <img id="pet-img" src="https://i.ibb.co/mH7L6qB/egg.png">
                    <small>PET</small>
                </div>
                <div class="hero-container">
                    <img id="hero-img" src="https://i.postimg.cc/qM7C4G4G/mage-idle.png">
                    <small>MAESTRO</small>
                </div>
            </div>

            <div id="loot-chest" onclick="openChest()" style="display:none">
                <img src="https://i.postimg.cc/mD7Xz0D7/chest.png">
                <div class="chest-glow"></div>
            </div>
        </main>

        <section id="menu-panel">
            <div class="menu-tabs">
                <button id="tab-up" class="active" onclick="switchTab('upgrades')">⚔️ FORJA</button>
                <button id="tab-inv" onclick="switchTab('inventory')">🎒 EQUIPO</button>
            </div>
            <div id="menu-content" class="scroll-view"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
    </html>
